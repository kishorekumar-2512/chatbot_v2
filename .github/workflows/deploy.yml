###############################################################################
# CI/CD — Deploy Backend (ECS) & Frontend (S3 + CloudFront)
#
# Trigger:  push to main
# Auth:     OIDC (no static AWS keys)
# Secrets required:
#   AWS_ROLE_ARN              – IAM role ARN trusted by the GitHub OIDC provider
#   ECR_BACKEND_REPO          – Full ECR repo URL  (e.g. 123456789012.dkr.ecr.ap-south-1.amazonaws.com/chatbot-backend)
#   ECS_CLUSTER               – ECS cluster name
#   ECS_SERVICE               – ECS service name
#   S3_FRONTEND_BUCKET        – S3 bucket name for the React frontend
#   CLOUDFRONT_DISTRIBUTION_ID – CloudFront distribution to invalidate
#   BACKEND_PUBLIC_URL        – Public URL of the backend API
#   ADMIN_API_KEY             – Admin key for the /admin/reindex endpoint
###############################################################################

name: Deploy

on:
  push:
    branches: [main]

# Required for OIDC token to be issued to this workflow
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ---------------------------------------------------------------
      # 1. Checkout
      # ---------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 2. Configure AWS credentials (OIDC — no static keys)
      # ---------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      # ---------------------------------------------------------------
      # 3. Login to Amazon ECR
      # ---------------------------------------------------------------
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ---------------------------------------------------------------
      # 4–5. Build & push backend Docker image
      # ---------------------------------------------------------------
      - name: Build & push backend image
        env:
          ECR_REPO: ${{ secrets.ECR_BACKEND_REPO }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:latest \
            -f backend/Dockerfile .
          docker push $ECR_REPO:$IMAGE_TAG
          docker push $ECR_REPO:latest

      # ---------------------------------------------------------------
      # 6. Deploy to ECS (force new deployment)
      # ---------------------------------------------------------------
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment \
            --region ap-south-1

      # ---------------------------------------------------------------
      # 7. Build React frontend
      # ---------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          VITE_API_URL=${{ secrets.BACKEND_PUBLIC_URL }} npm run build

      # ---------------------------------------------------------------
      # 8. Sync frontend build to S3
      # ---------------------------------------------------------------
      - name: Sync to S3
        run: |
          aws s3 sync web/dist/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --region ap-south-1

      # ---------------------------------------------------------------
      # 9. Invalidate CloudFront cache
      # ---------------------------------------------------------------
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      # ---------------------------------------------------------------
      # 10. Wait for ECS service to stabilize
      # ---------------------------------------------------------------
      - name: Wait for ECS to stabilize
        run: sleep 60

      # ---------------------------------------------------------------
      # 11. Post-deploy — trigger reindex
      # ---------------------------------------------------------------
      - name: Trigger reindex
        run: |
          curl -X POST "${{ secrets.BACKEND_PUBLIC_URL }}/admin/reindex" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_API_KEY }}" \
            --fail --silent --show-error --max-time 30

      # ---------------------------------------------------------------
      # 12. Health check
      # ---------------------------------------------------------------
      - name: Health check
        run: |
          curl -f "${{ secrets.BACKEND_PUBLIC_URL }}/health" \
            --silent --show-error --max-time 15
